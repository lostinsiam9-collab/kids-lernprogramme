<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, maximum-scale=1">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <title>Zeit-Reise · Deutsche Zeitformen</title>
  <style>
    :root {
      --bg-start: #e8f4f8;
      --bg-end: #fef3e2;
      --primary: #4a90e2;
      --primary-dark: #2c5f9e;
      --accent: #f5a623;
      --success: #58a55c;
      --success-bg: #e8f5e9;
      --error: #e85c5c;
      --error-bg: #fde8e8;
      --text: #2c3e50;
      --text-soft: #7f8c8d;
      --line: #e0e6ed;
      --line-strong: #c8d2dc;
      --card-bg: #ffffff;
      --tone-praes: #58a55c;
      --tone-praet: #f5a623;
      --tone-perf:  #4a90e2;
      --tone-futur: #9b59b6;
      --tone-praes-bg: #e8f5e9;
      --tone-praet-bg: #fff3e0;
      --tone-perf-bg:  #e3f2fd;
      --tone-futur-bg: #f3e5f5;
      --shadow: 0 2px 8px rgba(44, 62, 80, 0.08);
      --shadow-lg: 0 8px 24px rgba(44, 62, 80, 0.15);
      --radius: 14px;
      --radius-sm: 8px;
    }

    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    html { -webkit-text-size-adjust: 100%; }
    html, body { margin: 0; padding: 0; }
    body {
      background: linear-gradient(135deg, var(--bg-start), var(--bg-end));
      color: var(--text);
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      font-size: 19px;
      min-height: 100vh;
      padding: 20px 14px 80px;
    }

    h1, h2, h3 { font-family: 'Segoe UI', system-ui, sans-serif; }
    h1 { font-size: 32px; margin: 0; text-align: center; color: var(--primary-dark); letter-spacing: 1px; }
    h1 .sub { display: block; font-size: 13px; letter-spacing: 4px; color: var(--text-soft); margin-bottom: 6px; text-transform: uppercase; }
    h2 { font-size: 24px; color: var(--primary-dark); margin: 0 0 16px; }

    button, input, select { font-family: inherit; font-size: 19px; }
    button { cursor: pointer; touch-action: manipulation; min-height: 48px; }
    input[type="text"] {
      min-height: 48px; padding: 10px 14px;
      border: 2px solid var(--line-strong); border-radius: var(--radius-sm);
      background: var(--card-bg); color: var(--text);
      outline: none; transition: border-color 0.15s;
    }
    input[type="text"]:focus { border-color: var(--primary); }
    input[type="text"].correct { border-color: var(--success); background: var(--success-bg); }
    input[type="text"].wrong { border-color: var(--error); background: var(--error-bg); animation: shake 0.4s; }

    @keyframes shake {
      0%, 100% { transform: translateX(0); }
      25% { transform: translateX(-6px); }
      75% { transform: translateX(6px); }
    }
    @keyframes pop {
      0% { transform: scale(0.8); opacity: 0; }
      60% { transform: scale(1.05); opacity: 1; }
      100% { transform: scale(1); }
    }
    @keyframes fade-in {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }
    @keyframes wave {
      0%, 100% { transform: rotate(0deg); }
      25% { transform: rotate(-15deg); }
      75% { transform: rotate(15deg); }
    }
    @keyframes pulse-success {
      0% { box-shadow: 0 0 0 0 rgba(88, 165, 92, 0.5); }
      70% { box-shadow: 0 0 0 16px rgba(88, 165, 92, 0); }
      100% { box-shadow: 0 0 0 0 rgba(88, 165, 92, 0); }
    }

    main { max-width: 920px; margin: 0 auto; }
    .screen { display: none; }
    .screen.active { display: block; animation: fade-in 0.25s; }

    .back-btn {
      background: none; border: none; color: var(--text);
      font-size: 16px; padding: 8px 12px; margin-bottom: 12px;
    }
    .back-btn::before { content: "← "; }

    /* === Setup-Bar === */
    .setup-bar {
      background: var(--card-bg);
      border-radius: var(--radius);
      padding: 16px 18px;
      margin: 18px 0 22px;
      box-shadow: var(--shadow);
    }
    .setup-row { display: flex; flex-wrap: wrap; align-items: center; gap: 8px; margin-bottom: 12px; }
    .setup-row:last-child { margin-bottom: 0; }
    .setup-label {
      font-weight: 600;
      color: var(--text-soft); font-size: 13px;
      text-transform: uppercase; letter-spacing: 1px;
      width: 100%; margin-bottom: 4px;
    }
    .chip {
      display: inline-flex; align-items: center; justify-content: center;
      padding: 8px 14px; border-radius: 22px;
      border: 2px solid var(--line); background: white;
      cursor: pointer; font-size: 15px; user-select: none;
      min-height: 40px; min-width: 56px;
      transition: all 0.15s;
    }
    .chip.active { background: var(--primary); color: white; border-color: var(--primary); }
    .chip.tone-praes.active { background: var(--tone-praes); border-color: var(--tone-praes); }
    .chip.tone-praet.active { background: var(--tone-praet); border-color: var(--tone-praet); }
    .chip.tone-perf.active  { background: var(--tone-perf);  border-color: var(--tone-perf); }
    .chip.tone-futur.active { background: var(--tone-futur); border-color: var(--tone-futur); }
    .setup-reset {
      background: none; border: none; color: var(--text-soft);
      font-size: 13px; text-decoration: underline; padding: 4px 0;
      min-height: auto;
    }

    /* === Mode Cards === */
    .modes {
      display: grid; grid-template-columns: repeat(2, 1fr);
      gap: 14px; margin-bottom: 18px;
    }
    .mode-card {
      background: var(--card-bg);
      border-left: 5px solid var(--line);
      border-radius: var(--radius);
      padding: 20px 18px;
      text-align: left;
      box-shadow: var(--shadow);
      transition: transform 0.1s ease, box-shadow 0.2s ease;
      border-top: none; border-right: none; border-bottom: none;
      display: block; width: 100%; color: var(--text);
    }
    @media (hover: hover) {
      .mode-card:hover { transform: translateY(-2px); box-shadow: var(--shadow-lg); }
    }
    .mode-card .icon { font-size: 30px; margin-bottom: 4px; display: block; }
    .mode-card h3 { margin: 4px 0 4px; font-size: 19px; color: var(--primary-dark); }
    .mode-card p { margin: 0; font-size: 14px; color: var(--text-soft); }
    .mode-card.cards   { border-left-color: #e07a5f; }
    .mode-card.typing  { border-left-color: var(--primary); }
    .mode-card.quiz    { border-left-color: var(--success); }
    .mode-card.sorter  { border-left-color: var(--tone-futur); }
    .mode-card.mix {
      grid-column: 1 / -1;
      border-left-color: var(--accent);
      background: linear-gradient(135deg, #fff 0%, #fff8e7 100%);
    }

    /* === Progress Bars === */
    .progress {
      background: var(--card-bg); border-radius: var(--radius);
      padding: 14px 18px; box-shadow: var(--shadow); margin-top: 16px;
    }
    .progress h3 { font-size: 14px; text-transform: uppercase; letter-spacing: 1px; color: var(--text-soft); margin: 0 0 10px; }
    .progress-row { display: grid; grid-template-columns: 100px 1fr 50px; gap: 10px; align-items: center; margin: 6px 0; font-size: 15px; }
    .progress-row .bar { background: var(--line); border-radius: 4px; height: 10px; overflow: hidden; }
    .progress-row .bar-fill { height: 100%; transition: width 0.4s; }
    .progress-row.praes .bar-fill { background: var(--tone-praes); }
    .progress-row.praet .bar-fill { background: var(--tone-praet); }
    .progress-row.perf  .bar-fill { background: var(--tone-perf); }
    .progress-row.futur .bar-fill { background: var(--tone-futur); }
    .progress-row .pct { text-align: right; color: var(--text-soft); font-size: 14px; }

    /* === Task Bar (Aufgabe x von y, Streak) === */
    .task-bar {
      display: flex; justify-content: space-between; align-items: center;
      font-size: 14px; color: var(--text-soft); margin-bottom: 14px;
    }
    .streak { font-size: 16px; letter-spacing: 2px; }

    /* === Karteikarten === */
    .flashcard {
      background: var(--card-bg);
      border-radius: var(--radius);
      padding: 50px 30px;
      text-align: center;
      box-shadow: var(--shadow-lg);
      margin: 30px 0 24px;
      cursor: pointer;
      min-height: 220px;
      display: flex; flex-direction: column; justify-content: center;
      transition: transform 0.4s;
      transform-style: preserve-3d;
    }
    .flashcard.flipped { transform: rotateY(0deg); }
    .flashcard .question {
      font-size: 28px; margin-bottom: 10px;
    }
    .flashcard .question .pronoun {
      color: var(--primary); font-weight: 700;
    }
    .flashcard .question .verb {
      color: var(--text); font-style: italic;
    }
    .flashcard .tense-tag {
      display: inline-block;
      padding: 6px 14px; border-radius: 16px;
      font-size: 14px; font-weight: 600; letter-spacing: 1px;
      margin-top: 12px;
    }
    .flashcard .tense-tag.praes { background: var(--tone-praes-bg); color: var(--tone-praes); }
    .flashcard .tense-tag.praet { background: var(--tone-praet-bg); color: var(--tone-praet); }
    .flashcard .tense-tag.perf  { background: var(--tone-perf-bg);  color: var(--tone-perf); }
    .flashcard .tense-tag.futur { background: var(--tone-futur-bg); color: var(--tone-futur); }
    .flashcard .answer {
      font-size: 36px; font-weight: 700; color: var(--primary-dark);
      margin: 20px 0 8px;
      animation: pop 0.3s;
    }
    .flashcard .hint { color: var(--text-soft); font-size: 14px; margin-top: 16px; }
    .flashcard-buttons { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
    .flashcard-buttons button {
      padding: 14px; border-radius: var(--radius);
      border: 2px solid var(--line-strong); background: white;
      font-size: 17px; font-weight: 600;
    }
    .flashcard-buttons .sitzt { background: var(--success); color: white; border-color: var(--success); }
    .flashcard-buttons .nochmal { background: var(--accent); color: white; border-color: var(--accent); }

    /* === Tippen-Modus === */
    .typing-container {
      background: var(--card-bg);
      border-radius: var(--radius);
      padding: 24px 22px;
      box-shadow: var(--shadow);
      margin-bottom: 16px;
    }
    .typing-step {
      animation: fade-in 0.3s;
    }
    .typing-prompt {
      font-size: 16px; color: var(--text-soft);
      margin-bottom: 12px; text-transform: uppercase; letter-spacing: 1px;
    }
    .typing-tense {
      display: inline-block; padding: 4px 12px; border-radius: 14px;
      font-weight: 700; letter-spacing: 1px;
    }
    .typing-tense.praes { background: var(--tone-praes-bg); color: var(--tone-praes); }
    .typing-tense.praet { background: var(--tone-praet-bg); color: var(--tone-praet); }
    .typing-tense.perf  { background: var(--tone-perf-bg);  color: var(--tone-perf); }
    .typing-tense.futur { background: var(--tone-futur-bg); color: var(--tone-futur); }
    .typing-task {
      font-size: 26px; margin: 16px 0 14px; text-align: center;
    }
    .typing-task .pronoun { color: var(--primary); font-weight: 700; }
    .typing-task .verb { color: var(--text); font-style: italic; }
    .typing-input-row {
      display: flex; align-items: center; gap: 10px; flex-wrap: wrap;
      margin-bottom: 14px;
    }
    .typing-input-row .pronoun-label {
      font-size: 22px; color: var(--primary); font-weight: 700; min-width: 70px;
    }
    .typing-input-row input[type="text"] {
      flex: 1; min-width: 120px;
    }
    .typing-input-row input.aux { max-width: 110px; flex: 0 1 110px; }
    .typing-input-row input.main { flex: 1; }
    .typing-input-row button.check {
      background: var(--primary); color: white; border: none;
      border-radius: var(--radius-sm); padding: 10px 22px;
      font-weight: 600; font-size: 17px;
    }
    .typing-feedback {
      padding: 12px 14px; border-radius: var(--radius-sm);
      font-size: 17px; margin-top: 8px;
      animation: fade-in 0.3s;
    }
    .typing-feedback.correct { background: var(--success-bg); color: var(--success); font-weight: 600; }
    .typing-feedback.wrong { background: var(--error-bg); color: var(--error); }
    .typing-feedback .hint { font-size: 14px; color: var(--text-soft); margin-top: 4px; }
    .typing-feedback .correct-form { font-weight: 700; font-size: 19px; }
    .rewrite-block {
      margin-top: 12px;
      animation: fade-in 0.4s;
    }
    .rewrite-block p { margin: 0 0 6px; font-size: 14px; color: var(--text-soft); }
    .typing-divider {
      margin: 20px 0 14px;
      border-top: 1px dashed var(--line-strong);
      padding-top: 14px;
    }

    /* === Quick Quiz === */
    .quiz-container {
      background: var(--card-bg); border-radius: var(--radius);
      padding: 24px 22px; box-shadow: var(--shadow); margin-bottom: 14px;
    }
    .quiz-task { font-size: 22px; text-align: center; margin: 8px 0 18px; }
    .quiz-task .pronoun { color: var(--primary); font-weight: 700; }
    .quiz-task .verb { font-style: italic; }
    .quiz-options { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
    .quiz-option {
      background: white; border: 2px solid var(--line-strong);
      border-radius: var(--radius); padding: 16px;
      font-size: 19px; min-height: 60px;
      transition: all 0.15s; text-align: center;
    }
    @media (hover: hover) {
      .quiz-option:hover { border-color: var(--primary); }
    }
    .quiz-option.correct { background: var(--success); color: white; border-color: var(--success); animation: pulse-success 0.6s; }
    .quiz-option.wrong { background: var(--error); color: white; border-color: var(--error); animation: shake 0.4s; }
    .quiz-option.show-correct { background: var(--success-bg); border-color: var(--success); color: var(--success); font-weight: 700; }
    .quiz-next-bar {
      margin-top: 16px; text-align: center; min-height: 50px;
    }
    .quiz-next-bar button {
      background: var(--primary); color: white; border: none;
      border-radius: var(--radius-sm); padding: 12px 28px;
      font-weight: 600; font-size: 17px;
      opacity: 0; transition: opacity 0.2s;
    }
    .quiz-next-bar button.show { opacity: 1; }

    /* === Zeit-Sortierer === */
    .sorter-container {
      background: var(--card-bg); border-radius: var(--radius);
      padding: 18px 16px; box-shadow: var(--shadow); margin-bottom: 14px;
    }
    .sorter-instructions {
      text-align: center; color: var(--text-soft); font-size: 15px;
      margin: 8px 0 14px;
    }
    .sorter-pool {
      display: flex; flex-wrap: wrap; gap: 10px;
      justify-content: center;
      min-height: 140px;
      padding: 10px;
      border-radius: var(--radius-sm);
      background: rgba(0,0,0,0.02);
      margin-bottom: 18px;
    }
    .sorter-card {
      background: white;
      border: 2px solid var(--line-strong);
      border-radius: var(--radius-sm);
      padding: 12px 16px;
      font-size: 18px; font-weight: 600;
      box-shadow: var(--shadow);
      cursor: grab;
      touch-action: none;
      user-select: none;
      -webkit-user-select: none;
      transition: box-shadow 0.15s;
      position: relative;
    }
    .sorter-card.dragging {
      cursor: grabbing;
      box-shadow: var(--shadow-lg);
      z-index: 100;
      transition: none;
    }
    .sorter-card.placed { visibility: hidden; }
    .sorter-card.returning { transition: transform 0.3s ease-out; }

    .sorter-dropzones {
      display: grid; grid-template-columns: repeat(4, 1fr);
      gap: 10px;
    }
    .dropzone {
      border-radius: var(--radius);
      padding: 22px 8px;
      text-align: center;
      font-weight: 700; font-size: 15px;
      letter-spacing: 1px;
      min-height: 90px;
      border: 3px dashed transparent;
      transition: all 0.15s;
    }
    .dropzone.praes { background: var(--tone-praes-bg); color: var(--tone-praes); border-color: var(--tone-praes); }
    .dropzone.praet { background: var(--tone-praet-bg); color: var(--tone-praet); border-color: var(--tone-praet); }
    .dropzone.perf  { background: var(--tone-perf-bg);  color: var(--tone-perf);  border-color: var(--tone-perf); }
    .dropzone.futur { background: var(--tone-futur-bg); color: var(--tone-futur); border-color: var(--tone-futur); }
    .dropzone .count {
      display: block; font-size: 13px; opacity: 0.7; margin-top: 4px; font-weight: 400;
    }
    .dropzone.hover-target { transform: scale(1.05); }
    .dropzone.success-flash { animation: pulse-success 0.5s; }
    .dropzone.error-shake { animation: shake 0.4s; }

    /* Tap-Fallback Popup */
    .tap-popup {
      position: absolute;
      background: white;
      border-radius: var(--radius);
      box-shadow: var(--shadow-lg);
      padding: 10px;
      z-index: 200;
      display: grid; grid-template-columns: 1fr 1fr;
      gap: 6px;
      animation: pop 0.2s;
    }
    .tap-popup button {
      padding: 10px 14px; border: none; border-radius: var(--radius-sm);
      font-weight: 700; font-size: 14px; letter-spacing: 1px;
      min-width: 110px;
    }
    .tap-popup .praes { background: var(--tone-praes-bg); color: var(--tone-praes); }
    .tap-popup .praet { background: var(--tone-praet-bg); color: var(--tone-praet); }
    .tap-popup .perf  { background: var(--tone-perf-bg);  color: var(--tone-perf); }
    .tap-popup .futur { background: var(--tone-futur-bg); color: var(--tone-futur); }

    /* === Session-Bilanz === */
    .summary-container {
      background: var(--card-bg); border-radius: var(--radius);
      padding: 28px 22px; box-shadow: var(--shadow); text-align: center;
    }
    .summary-title { font-size: 28px; margin-bottom: 6px; }
    .summary-score { font-size: 48px; font-weight: 700; color: var(--primary); margin: 12px 0; }
    .summary-headline { color: var(--text-soft); margin-bottom: 18px; }
    .summary-results {
      text-align: left; max-height: 280px; overflow-y: auto;
      margin: 18px 0; padding: 12px;
      background: rgba(0,0,0,0.02); border-radius: var(--radius-sm);
    }
    .summary-results .row {
      display: flex; align-items: center; gap: 10px;
      padding: 6px 0; font-size: 15px;
      border-bottom: 1px solid var(--line);
    }
    .summary-results .row:last-child { border-bottom: none; }
    .summary-results .row .icon { width: 24px; text-align: center; font-weight: 700; font-size: 18px; }
    .summary-results .row .icon.ok { color: var(--success); }
    .summary-results .row .icon.no { color: var(--error); }
    .summary-results .row .form { font-weight: 600; }
    .summary-results .row .meta { color: var(--text-soft); font-size: 13px; }
    .heatmap { margin: 18px 0; }
    .heatmap-row { display: grid; grid-template-columns: 110px 1fr 50px; gap: 8px; align-items: center; margin: 4px 0; font-size: 14px; }
    .heatmap-row .bar { background: var(--line); border-radius: 4px; height: 8px; overflow: hidden; }
    .heatmap-row .bar-fill { height: 100%; }
    .summary-actions { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-top: 16px; }
    .summary-actions button {
      padding: 14px; border-radius: var(--radius);
      font-size: 17px; font-weight: 600;
      border: 2px solid var(--primary);
      background: var(--primary); color: white;
    }
    .summary-actions button.secondary { background: white; color: var(--primary); }

    /* === Maskottchen === */
    .mascot {
      position: fixed; bottom: 24px; right: 24px;
      width: 64px; height: 64px;
      font-size: 56px;
      display: none;
      pointer-events: none;
      z-index: 999;
      animation: wave 0.6s ease-in-out 2;
    }
    .mascot.show { display: block; }

    /* === Verb Group Filter === */
    .verb-summary {
      font-size: 14px; color: var(--text-soft);
      margin-top: 8px;
    }

    /* === Responsive === */
    @media (max-width: 600px) {
      body { padding: 14px 10px 80px; font-size: 17px; }
      h1 { font-size: 26px; }
      .modes { grid-template-columns: 1fr; }
      .quiz-options { grid-template-columns: 1fr; }
      .sorter-dropzones { grid-template-columns: repeat(2, 1fr); }
      .progress-row { grid-template-columns: 80px 1fr 40px; font-size: 13px; }
      .heatmap-row { grid-template-columns: 90px 1fr 40px; }
      .flashcard .question { font-size: 22px; }
      .flashcard .answer { font-size: 30px; }
      .typing-task { font-size: 22px; }
      .typing-input-row .pronoun-label { font-size: 19px; min-width: 50px; }
    }

    /* iPad-Spezifika */
    .sorter-container { overscroll-behavior: contain; }
    .typing-container input, .typing-container button { -webkit-appearance: none; }
  </style>
</head>
<body>
  <main>
    <section id="screen-home" class="screen active">
      <h1><span class="sub">Zeit-Reise</span>Deutsche Zeitformen</h1>

      <div class="setup-bar" id="setup-bar"></div>

      <div class="modes">
        <button class="mode-card cards" data-action="start-cards">
          <span class="icon">📜</span>
          <h3>Karteikarten</h3>
          <p>Verbform raten, selbst einschätzen</p>
        </button>
        <button class="mode-card typing" data-action="start-typing">
          <span class="icon">✏️</span>
          <h3>Tippen</h3>
          <p>2-Schritt-Aufgabe mit Folgenfrage</p>
        </button>
        <button class="mode-card quiz" data-action="start-quiz">
          <span class="icon">⚡</span>
          <h3>Quick Quiz</h3>
          <p>4 Antworten zur Auswahl</p>
        </button>
        <button class="mode-card sorter" data-action="start-sorter">
