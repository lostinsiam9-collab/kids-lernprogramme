<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, maximum-scale=1">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="theme-color" content="#fde9ec">
  <title>Herz &amp; Kreislauf · Entdecken und Üben</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@500;600;700&family=Nunito:wght@600;700;800&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-grad-start:    #fde9ec;
      --bg-grad-end:      #e7f3ff;
      --bg-spot:          rgba(255,255,255,0.65);
      --blood-oxy:        #e85d5d;
      --blood-oxy-soft:   #ffd6d6;
      --blood-deoxy:      #4a90c2;
      --blood-deoxy-soft: #cfe4f3;
      --heart-muscle:     #b85450;
      --heart-muscle-deep:#8a3a37;
      --heart-muscle-soft:#d98480;
      --valve:            #fbf7ee;
      --valve-edge:       #c9bfa8;
      --ink:              #2b3a4a;
      --ink-soft:         #6b7a8a;
      --ink-faint:        #aab5c2;
      --card:             rgba(255,255,255,0.86);
      --card-strong:      rgba(255,255,255,0.96);
      --card-shadow:      0 10px 30px rgba(46, 64, 87, 0.10), 0 2px 6px rgba(46, 64, 87, 0.06);
      --card-shadow-lg:   0 20px 50px rgba(46, 64, 87, 0.16), 0 4px 12px rgba(46, 64, 87, 0.08);
      --success:          #4caf6e;
      --success-soft:     #e6f5ec;
      --success-glow:     rgba(76, 175, 110, 0.35);
      --error:            #e07277;
      --error-soft:       #fbe7e9;
      --accent-warm:      #f6b26b;
      --accent-cool:      #8da9d6;
      --radius-lg:        20px;
      --radius-md:        14px;
      --radius-sm:        9px;
      --ease-soft:        cubic-bezier(0.22, 1, 0.36, 1);
      --ease-pop:         cubic-bezier(0.34, 1.56, 0.64, 1);
      --font-display:     'Nunito', 'Quicksand', 'Segoe UI', system-ui, -apple-system, sans-serif;
      --font-body:        'Quicksand', 'Segoe UI', system-ui, -apple-system, sans-serif;
    }

    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    html { -webkit-text-size-adjust: 100%; }
    html, body { margin: 0; padding: 0; }
    body {
      background:
        radial-gradient(ellipse 80% 60% at 50% 30%, var(--bg-spot), transparent 70%),
        linear-gradient(160deg, var(--bg-grad-start) 0%, #f4ecf4 45%, var(--bg-grad-end) 100%);
      background-attachment: fixed;
      color: var(--ink);
      font-family: var(--font-body);
      font-size: 19px;
      line-height: 1.45;
      min-height: 100vh;
      padding: 16px max(14px, env(safe-area-inset-left)) calc(80px + env(safe-area-inset-bottom)) max(14px, env(safe-area-inset-right));
      padding-top: max(16px, env(safe-area-inset-top));
    }

    h1, h2, h3 { font-family: var(--font-display); font-weight: 700; letter-spacing: 0.2px; }
    h1 {
      font-size: clamp(28px, 4vw, 38px);
      margin: 0;
      text-align: center;
      color: var(--heart-muscle-deep);
    }
    h1 .sub {
      display: block;
      font-family: var(--font-body);
      font-weight: 600;
      font-size: 13px;
      letter-spacing: 4px;
      color: var(--ink-soft);
      margin-bottom: 6px;
      text-transform: uppercase;
    }
    h2 { font-size: 22px; color: var(--ink); margin: 0 0 14px; }
    h3 { font-size: 18px; color: var(--ink); margin: 0 0 10px; }

    button, input, select { font-family: inherit; font-size: 19px; }
    button { cursor: pointer; touch-action: manipulation; min-height: 48px; }

    .app { max-width: 1100px; margin: 0 auto; }

    header.hero {
      text-align: center;
      padding: 6px 8px 14px;
      animation: fade-in 0.6s var(--ease-soft);
    }
    header.hero .tagline {
      margin: 6px 0 0;
      color: var(--ink-soft);
      font-size: 15px;
    }

    .tab-nav {
      display: flex;
      gap: 8px;
      justify-content: center;
      margin: 12px auto 18px;
      max-width: 420px;
      background: var(--card);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      padding: 6px;
      border-radius: 999px;
      box-shadow: var(--card-shadow);
    }
    .tab-nav button {
      flex: 1;
      min-height: 48px;
      border: none;
      background: transparent;
      color: var(--ink-soft);
      font-weight: 700;
      font-family: var(--font-display);
      font-size: 17px;
      border-radius: 999px;
      transition: all 0.25s var(--ease-soft);
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }
    .tab-nav button.active {
      background: linear-gradient(135deg, var(--blood-oxy), var(--heart-muscle));
      color: white;
      box-shadow: 0 4px 14px rgba(184, 84, 80, 0.35);
      transform: translateY(-1px);
    }

    .tab-panel { animation: panel-in 0.35s var(--ease-soft); }
    .tab-panel.hidden { display: none; }
    @keyframes panel-in {
      from { opacity: 0; transform: scale(0.98) translateY(4px); }
      to   { opacity: 1; transform: scale(1) translateY(0); }
    }

    .card {
      background: var(--card);
      backdrop-filter: blur(14px);
      -webkit-backdrop-filter: blur(14px);
      border: 1px solid rgba(255,255,255,0.6);
      border-radius: var(--radius-lg);
      box-shadow: var(--card-shadow);
      padding: 18px;
      margin-bottom: 16px;
    }
    .card-strong { background: var(--card-strong); }

    .chip-row { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 4px; }
    .chip {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 10px 16px;
      min-height: 44px;
      border: 2px solid transparent;
      background: rgba(255,255,255,0.7);
      color: var(--ink-soft);
      border-radius: 999px;
      font-weight: 600;
      font-size: 15px;
      transition: all 0.2s var(--ease-soft);
      box-shadow: 0 2px 6px rgba(46,64,87,0.05);
    }
    .chip:hover { transform: translateY(-1px); }
    .chip.active {
      background: white;
      color: var(--ink);
      border-color: var(--heart-muscle-soft);
      box-shadow: 0 4px 12px rgba(184, 84, 80, 0.2);
    }
    .chip.active .dot { background: var(--heart-muscle); }
    .chip .dot {
      width: 10px; height: 10px; border-radius: 50%;
      background: var(--ink-faint);
      transition: background 0.2s;
    }

    .stage {
      position: relative;
      width: 100%;
      max-width: 720px;
      margin: 0 auto;
      aspect-ratio: 1 / 1;
      border-radius: var(--radius-lg);
      overflow: visible;
    }
    .stage svg.heart {
      width: 100%;
      height: 100%;
      display: block;
      filter: drop-shadow(0 10px 24px rgba(184, 84, 80, 0.18));
    }

    .heart-group {
      transform-origin: 300px 320px;
      animation: heart-beat 1.05s var(--ease-soft) infinite;
    }
    @keyframes heart-beat {
      0%   { transform: scale(1.00); }
      8%   { transform: scale(1.035); }
      16%  { transform: scale(1.00); }
      24%  { transform: scale(1.025); }
      40%  { transform: scale(1.00); }
      100% { transform: scale(1.00); }
    }

    .label-group { pointer-events: none; }
    .label-group .label {
      opacity: 0;
      transition: opacity 0.3s var(--ease-soft);
    }
    .label-group.show .label { opacity: 1; }
    .label text {
      font-family: var(--font-display);
      font-weight: 700;
      font-size: 15px;
      fill: var(--ink);
      paint-order: stroke;
      stroke: rgba(255,255,255,0.92);
      stroke-width: 4px;
      stroke-linejoin: round;
    }
    .label .leader {
      stroke: var(--ink-faint);
      stroke-width: 1.4;
      fill: none;
      stroke-dasharray: 3 3;
    }

    .hotspot {
      fill: transparent;
      stroke: transparent;
      cursor: pointer;
      transition: fill 0.2s;
    }
    .hotspot:hover { fill: rgba(255,255,255,0.25); }

    .region-highlight {
      fill: none;
      stroke: var(--accent-warm);
      stroke-width: 5;
      stroke-linejoin: round;
      pointer-events: none;
      opacity: 0;
    }
    .region-highlight.active {
      opacity: 1;
      animation: region-pulse 1.2s var(--ease-soft) infinite;
    }
    @keyframes region-pulse {
      0%, 100% { stroke-opacity: 1; stroke-width: 5; }
      50%      { stroke-opacity: 0.4; stroke-width: 8; }
    }

    .flow-path {
      fill: none;
      stroke-width: 6;
      stroke-linecap: round;
      stroke-linejoin: round;
      opacity: 0;
      transition: opacity 0.3s var(--ease-soft);
    }
    .flow-path.lungen      { stroke: var(--blood-deoxy); }
    .flow-path.lungen-back { stroke: var(--blood-oxy); }
    .flow-path.koerper     { stroke: var(--blood-oxy); }
    .flow-path.koerper-back{ stroke: var(--blood-deoxy); }

    .drop { filter: drop-shadow(0 1px 2px rgba(0,0,0,0.18)); }

    .stage-controls {
      margin-top: 12px;
      display: flex;
      flex-wrap: wrap;
      gap: 14px;
      align-items: center;
      justify-content: center;
    }
    .speed {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      background: var(--card);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      padding: 8px 16px;
      border-radius: 999px;
      box-shadow: var(--card-shadow);
    }
    .speed label { font-size: 14px; color: var(--ink-soft); font-weight: 700; }
    .speed input[type="range"] {
      width: 140px;
      accent-color: var(--heart-muscle);
    }
    .tour-btn {
      padding: 10px 22px;
      border: none;
      background: linear-gradient(135deg, var(--blood-oxy), var(--heart-muscle));
      color: white;
      font-family: var(--font-display);
      font-weight: 700;
      font-size: 17px;
      border-radius: 999px;
      box-shadow: 0 6px 18px rgba(184,84,80,0.32);
      display: inline-flex;
      align-items: center;
      gap: 8px;
      transition: all 0.25s var(--ease-soft);
    }
    .tour-btn:hover { transform: translateY(-2px); box-shadow: 0 10px 24px rgba(184,84,80,0.4); }
    .tour-btn:active { transform: translateY(0); }

    .info-popup {
      position: absolute;
      max-width: 320px;
      background: var(--card-strong);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border-radius: var(--radius-md);
      box-shadow: var(--card-shadow-lg);
      padding: 14px 16px;
      z-index: 30;
      animation: pop 0.3s var(--ease-pop);
    }
    .info-popup .title {
      font-family: var(--font-display);
      font-weight: 700;
      color: var(--heart-muscle-deep);
      font-size: 18px;
      margin: 0 0 6px;
    }
    .info-popup p { margin: 0; font-size: 16px; line-height: 1.5; }
    .info-popup .close {
      position: absolute;
      top: 4px; right: 6px;
      background: transparent;
      border: none;
      font-size: 22px;
      color: var(--ink-soft);
      min-height: 32px;
      padding: 0 8px;
    }

    @keyframes pop {
      0%   { transform: scale(0.85); opacity: 0; }
      60%  { transform: scale(1.04); opacity: 1; }
      100% { transform: scale(1); }
    }

    .tour-bubble {
      position: absolute;
      max-width: 280px;
      background: linear-gradient(135deg, #ffffff, #fff6f6);
      border: 2px solid var(--heart-muscle-soft);
      border-radius: var(--radius-md);
      box-shadow: var(--card-shadow-lg);
      padding: 12px 16px;
      z-index: 35;
      animation: pop 0.35s var(--ease-pop);
    }
    .tour-bubble .step {
      font-size: 12px;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: var(--heart-muscle);
      font-weight: 700;
      margin-bottom: 4px;
    }
    .tour-bubble p { margin: 0 0 10px; font-size: 16px; line-height: 1.45; }
    .tour-bubble .controls { display: flex; justify-content: space-between; gap: 8px; }
    .tour-bubble button {
      flex: 1;
      min-height: 40px;
      border: none;
      border-radius: 999px;
      font-weight: 700;
      font-family: var(--font-display);
      font-size: 14px;
      padding: 8px 14px;
    }
    .tour-bubble button.prev { background: rgba(0,0,0,0.06); color: var(--ink-soft); }
    .tour-bubble button.next { background: var(--heart-muscle); color: white; }

    .mode-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
      gap: 12px;
      margin-bottom: 16px;
    }
    .mode-card {
      background: var(--card);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      border: 2px solid rgba(255,255,255,0.7);
      border-radius: var(--radius-md);
      padding: 16px;
      cursor: pointer;
      text-align: center;
      transition: all 0.25s var(--ease-soft);
      box-shadow: var(--card-shadow);
    }
    .mode-card:hover { transform: translateY(-3px); box-shadow: var(--card-shadow-lg); }
    .mode-card.active {
      border-color: var(--heart-muscle-soft);
      background: white;
      transform: translateY(-3px);
      box-shadow: 0 14px 32px rgba(184, 84, 80, 0.22);
    }
    .mode-card .emoji { font-size: 36px; display: block; margin-bottom: 6px; }
    .mode-card .name {
      font-family: var(--font-display);
      font-weight: 700;
      color: var(--ink);
      font-size: 17px;
      margin: 0 0 4px;
    }
    .mode-card .hint { color: var(--ink-soft); font-size: 14px; margin: 0; }

    .label-game { display: grid; grid-template-columns: 1fr; gap: 14px; }
    @media (min-width: 820px) { .label-game { grid-template-columns: 1.4fr 1fr; } }

    .game-stage {
      position: relative;
      width: 100%;
      max-width: 600px;
      margin: 0 auto;
      aspect-ratio: 1 / 1;
    }
    .game-stage svg { width: 100%; height: 100%; display: block; }

    .drop-slot {
      fill: rgba(255, 255, 255, 0.55);
      stroke: var(--ink-faint);
      stroke-width: 2;
      stroke-dasharray: 6 4;
      cursor: default;
      transition: all 0.2s var(--ease-soft);
    }
    .drop-slot.hover-target {
      fill: rgba(246, 178, 107, 0.35);
      stroke: var(--accent-warm);
      stroke-width: 3;
      stroke-dasharray: none;
    }
    .drop-slot.filled-correct {
      fill: var(--success-soft);
      stroke: var(--success);
      stroke-dasharray: none;
    }
    .drop-slot.shake { animation: slot-shake 0.4s; }
    @keyframes slot-shake {
      0%, 100% { transform: translateX(0); }
      25% { transform: translateX(-5px); }
      50% { transform: translateX(5px); }
      75% { transform: translateX(-3px); }
    }
    .slot-label {
      font-family: var(--font-display);
      font-weight: 700;
      font-size: 14px;
      fill: var(--success);
      paint-order: stroke;
      stroke: rgba(255,255,255,0.95);
      stroke-width: 3.5px;
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.3s;
    }
    .slot-label.show { opacity: 1; }

    .label-cards {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      justify-content: center;
      align-content: flex-start;
      align-items: flex-start;
    }
    .label-card {
      padding: 10px 16px;
      min-height: 48px;
      background: white;
      border: 2px solid var(--heart-muscle-soft);
      color: var(--ink);
      border-radius: var(--radius-md);
      font-weight: 700;
      font-family: var(--font-display);
      font-size: 16px;
      box-shadow: var(--card-shadow);
      touch-action: none;
      user-select: none;
      transition: transform 0.2s var(--ease-soft), opacity 0.3s;
      position: relative;
      cursor: grab;
    }
    .label-card:hover { transform: translateY(-2px); box-shadow: var(--card-shadow-lg); }
    .label-card.dragging {
      transform: scale(1.07);
      box-shadow: 0 16px 36px rgba(46,64,87,0.22);
      cursor: grabbing;
      z-index: 50;
    }
    .label-card.placed { opacity: 0; pointer-events: none; }
    .label-card.returning { transition: transform 0.3s var(--ease-pop); }
    .label-card.wrong { animation: card-shake 0.4s; border-color: var(--error); background: var(--error-soft); }
    @keyframes card-shake {
      0%, 100% { transform: translateX(0); }
      25% { transform: translateX(-6px); }
      50% { transform: translateX(6px); }
      75% { transform: translateX(-3px); }
    }

    .sorter-wrap { display: flex; flex-direction: column; gap: 14px; }

    .sorter-zones {
      display: flex;
      flex-wrap: nowrap;
      overflow-x: auto;
      padding: 8px 4px 14px;
      gap: 8px;
      scroll-snap-type: x mandatory;
    }
    .sort-slot {
      flex: 0 0 130px;
      min-height: 110px;
      background: rgba(255,255,255,0.55);
      border: 2px dashed var(--ink-faint);
      border-radius: var(--radius-md);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 8px;
      scroll-snap-align: start;
      position: relative;
      transition: all 0.2s var(--ease-soft);
    }
    .sort-slot .num {
      position: absolute;
      top: 6px;
      left: 8px;
      font-family: var(--font-display);
      font-weight: 800;
      color: var(--ink-faint);
      font-size: 14px;
    }
    .sort-slot.hover-target {
      background: rgba(246, 178, 107, 0.35);
      border-color: var(--accent-warm);
      border-style: solid;
    }
    .sort-slot.filled .num { color: var(--success); }
    .sort-slot.correct-final {
      background: var(--success-soft);
      border-color: var(--success);
      border-style: solid;
    }
    .sort-slot.wrong-final {
      background: var(--error-soft);
      border-color: var(--error);
      border-style: solid;
      animation: slot-shake 0.4s;
    }
    .sort-arrow {
      flex: 0 0 18px;
      align-self: center;
      color: var(--ink-faint);
      font-size: 18px;
      font-weight: 700;
    }

    .sorter-pool {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      justify-content: center;
    }
    .sort-card {
      padding: 12px 16px;
      min-height: 48px;
      background: white;
      border: 2px solid var(--blood-deoxy-soft);
      color: var(--ink);
      border-radius: var(--radius-md);
      font-weight: 700;
      font-family: var(--font-display);
      font-size: 15px;
      box-shadow: var(--card-shadow);
      touch-action: none;
      user-select: none;
      position: relative;
      cursor: grab;
      transition: transform 0.2s var(--ease-soft);
    }
    .sort-card.oxy   { border-color: var(--blood-oxy-soft); }
    .sort-card.deoxy { border-color: var(--blood-deoxy-soft); }
    .sort-card.dragging {
      transform: scale(1.07);
      box-shadow: 0 16px 36px rgba(46,64,87,0.22);
      cursor: grabbing;
      z-index: 50;
    }

    .sort-toolbar {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      justify-content: center;
      align-items: center;
    }
    .sort-toolbar .seg {
      display: inline-flex;
      background: var(--card);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      border-radius: 999px;
      padding: 4px;
      box-shadow: var(--card-shadow);
    }
    .sort-toolbar .seg button {
      border: none;
      background: transparent;
      color: var(--ink-soft);
      padding: 8px 14px;
      min-height: 40px;
      border-radius: 999px;
      font-weight: 700;
      font-family: var(--font-display);
      font-size: 14px;
      transition: all 0.2s var(--ease-soft);
    }
    .sort-toolbar .seg button.active {
      background: white;
      color: var(--ink);
      box-shadow: 0 2px 8px rgba(46,64,87,0.15);
    }
    .sort-toolbar .seg button[disabled] { opacity: 0.45; }

    .primary-btn {
      padding: 12px 22px;
      min-height: 48px;
      border: none;
      background: linear-gradient(135deg, var(--blood-oxy), var(--heart-muscle));
      color: white;
      font-family: var(--font-display);
      font-weight: 700;
      font-size: 16px;
      border-radius: 999px;
      box-shadow: 0 6px 18px rgba(184,84,80,0.32);
      transition: all 0.25s var(--ease-soft);
    }
    .primary-btn:hover { transform: translateY(-2px); box-shadow: 0 10px 24px rgba(184,84,80,0.4); }
    .primary-btn:active { transform: translateY(0); }
    .primary-btn[disabled] {
      background: var(--ink-faint);
      box-shadow: none;
      transform: none;
      cursor: not-allowed;
    }

    .ghost-btn {
      padding: 10px 18px;
      min-height: 44px;
      background: rgba(255,255,255,0.7);
      border: 2px solid var(--ink-faint);
      color: var(--ink);
      font-family: var(--font-display);
      font-weight: 700;
      font-size: 15px;
      border-radius: 999px;
      transition: all 0.2s var(--ease-soft);
    }
    .ghost-btn:hover { background: white; transform: translateY(-1px); }

    .flash-wrap { display: flex; flex-direction: column; align-items: center; gap: 16px; }
    .flash-card {
      width: min(100%, 420px);
      aspect-ratio: 4 / 3;
      perspective: 1200px;
      cursor: pointer;
      touch-action: manipulation;
    }
    .flash-inner {
      position: relative;
      width: 100%;
      height: 100%;

<body>

  <script>
  /* =================================================================

  const REGIONS = [
    { key: 'aorta',            name: 'Aorta',             info: 'Die Aorta ist die größte Schlagader im Körper. Sie führt das sauerstoffreiche Blut von der linken Kammer in den ganzen Körper.', slot: { x: 470, y: 110, r: 32 }, topic: 'gefaesse' },
    { key: 'pulmonalarterie',  name: 'Lungenarterie',     info: 'Die Lungenarterie bringt das verbrauchte (sauerstoffarme) Blut aus der rechten Kammer zur Lunge.',                              slot: { x: 140, y: 115, r: 32 }, topic: 'gefaesse' },
    { key: 'pulmonalvenen',    name: 'Lungenvenen',       info: 'Die Lungenvenen führen das frisch mit Sauerstoff getankte Blut von der Lunge zurück in den linken Vorhof.',                     slot: { x: 478, y: 200, r: 28 }, topic: 'gefaesse' },
    { key: 'hohlvene-sup',     name: 'Obere Hohlvene',    info: 'Die obere Hohlvene sammelt das sauerstoffarme Blut aus Kopf und Armen und leitet es in den rechten Vorhof.',                    slot: { x: 155, y: 95,  r: 28 }, topic: 'gefaesse' },
    { key: 'hohlvene-inf',     name: 'Untere Hohlvene',   info: 'Die untere Hohlvene sammelt das sauerstoffarme Blut aus dem unteren Körper und führt es in den rechten Vorhof.',                slot: { x: 178, y: 525, r: 28 }, topic: 'gefaesse' },
    { key: 'rechter-vorhof',   name: 'Rechter Vorhof',    info: 'Der rechte Vorhof nimmt das sauerstoffarme Blut aus dem Körper auf und schickt es weiter in die rechte Kammer.',                slot: { x: 232, y: 232, r: 34 }, topic: 'anatomie' },
    { key: 'rechte-kammer',    name: 'Rechte Kammer',     info: 'Die rechte Kammer pumpt das sauerstoffarme Blut in die Lunge.',                                                                  slot: { x: 235, y: 380, r: 40 }, topic: 'anatomie' },
    { key: 'linker-vorhof',    name: 'Linker Vorhof',     info: 'Der linke Vorhof nimmt das sauerstoffreiche Blut aus der Lunge auf und schickt es weiter in die linke Kammer.',                  slot: { x: 386, y: 232, r: 34 }, topic: 'anatomie' },
    { key: 'linke-kammer',     name: 'Linke Kammer',      info: 'Die linke Kammer ist der stärkste Muskel des Herzens. Sie pumpt das sauerstoffreiche Blut in den ganzen Körper.',                slot: { x: 383, y: 380, r: 42 }, topic: 'anatomie' },
    { key: 'septum',           name: 'Herzscheidewand',   info: 'Die Herzscheidewand (Septum) trennt die linke und rechte Herzhälfte. So vermischen sich sauerstoffreiches und sauerstoffarmes Blut nicht.', slot: { x: 309, y: 380, r: 16 }, topic: 'anatomie' },
    { key: 'trikuspidal',      name: 'Trikuspidalklappe', info: 'Sitzt zwischen rechtem Vorhof und rechter Kammer. Sie verhindert, dass das Blut zurück in den Vorhof fließt, wenn die Kammer pumpt.', slot: { x: 232, y: 290, r: 22 }, topic: 'klappen' },
    { key: 'mitral',           name: 'Mitralklappe',      info: 'Sitzt zwischen linkem Vorhof und linker Kammer (= Bikuspidalklappe). Sie verhindert, dass das Blut zurück in den Vorhof fließt.', slot: { x: 386, y: 290, r: 22 }, topic: 'klappen' },
    { key: 'pulmonalklappe',   name: 'Pulmonalklappe',    info: 'Sitzt am Ausgang der rechten Kammer. Sie öffnet sich, wenn das Blut in die Lunge gepumpt wird, und schließt danach.',            slot: { x: 232, y: 178, r: 20 }, topic: 'klappen' },

  const TOPICS = [
    { key: 'anatomie',  name: 'Anatomie',         emoji: '🫀' },
    { key: 'klappen',   name: 'Klappen',          emoji: '🚪' },
    { key: 'gefaesse',  name: 'Gefäße',           emoji: '🩸' },
    { key: 'lungen',    name: 'Lungenkreislauf',  emoji: '💨' },
    { key: 'koerper',   name: 'Körperkreislauf',  emoji: '💪' }
  ];

  const STATIONS_LUNGEN = [
    { id: 'rk', label: 'Rechte Kammer',          type: 'deoxy' },
    { id: 'pk', label: 'Pulmonalklappe',         type: 'deoxy' },
    { id: 'pa', label: 'Lungenarterie',          type: 'deoxy' },
    { id: 'lu', label: 'Lunge (Gasaustausch)',   type: 'mix' },

  const STATIONS_BEIDE = STATIONS_LUNGEN.concat(
    [{ id: 'mi', label: 'Mitralklappe', type: 'oxy' }]

    [{ id: 'tr', label: 'Trikuspidalklappe', type: 'deoxy' }]

  const FLASHCARDS = [
    { id: 'fc-aorta',     topic: 'gefaesse', term: 'Aorta',                func: 'Größte Schlagader. Bringt sauerstoffreiches Blut aus der linken Kammer in den Körper.' },
    { id: 'fc-pa',        topic: 'gefaesse', term: 'Lungenarterie',        func: 'Bringt sauerstoffarmes Blut aus der rechten Kammer zur Lunge.' },

    { x: 232, y: 232, text: 'Wir starten hier: Das verbrauchte (blaue) Blut sammelt sich im rechten Vorhof. Es kommt aus dem ganzen Körper.', layer: 'beide' },

      return { topics: Array.isArray(s.topics) && s.topics.length ? s.topics : DEFAULT_SETUP.topics };

    save() { try { localStorage.setItem(LEITNER_KEY, JSON.stringify(this.data)); } catch (e) {} },
    getBox(cardId) {
      const entry = this.data[cardId];
      return entry && entry.box ? entry.box : 1;
    },
    promote(cardId) {
      const cur = this.getBox(cardId);
      this.data[cardId] = { box: Math.min(MAX_BOX, cur + 1), updated: Date.now() };
      this.save();
    },
    demote(cardId) {
      this.data[cardId] = { box: 1, updated: Date.now() };
      this.save();
    },
    reset() { this.data = {}; this.save(); }
  };

    },
    save() { try { localStorage.setItem(STATS_KEY, JSON.stringify(this.data)); } catch (e) {} },
    record(topic, isCorrect) {
      if (!this.data[topic]) this.data[topic] = { total: 0, right: 0, wrong: 0 };
      this.data[topic].total += 1;
      if (isCorrect) this.data[topic].right += 1; else this.data[topic].wrong += 1;
      this.save();
    },
    reset() {
      this.data = {};

  function el(tag, attrs, ...children) {
    const ns = (tag === 'svg' || tag === 'path' || tag === 'circle' || tag === 'rect' ||
                tag === 'ellipse' || tag === 'g' || tag === 'text' || tag === 'defs' ||
                tag === 'linearGradient' || tag === 'radialGradient' || tag === 'stop' ||
                tag === 'polygon' || tag === 'line' || tag === 'filter' || tag === 'feGaussianBlur' ||
                tag === 'feColorMatrix' || tag === 'feMerge' || tag === 'feMergeNode' ||
                tag === 'feOffset' || tag === 'mpath' || tag === 'use' || tag === 'symbol' ||
                tag === 'animateMotion' || tag === 'tspan');
    const node = ns
      ? document.createElementNS('http://www.w3.org/2000/svg', tag)
      : document.createElement(tag);
    if (attrs) {
      for (const k in attrs) {
        if (k === 'class') node.setAttribute('class', attrs[k]);
        else if (k === 'style' && typeof attrs[k] === 'object') Object.assign(node.style, attrs[k]);
        else if (k.startsWith('on') && typeof attrs[k] === 'function') node.addEventListener(k.slice(2).toLowerCase(), attrs[k]);
        else if (attrs[k] !== null && attrs[k] !== undefined) node.setAttribute(k, attrs[k]);
      }
    }
    children.flat().forEach(c => {
      if (c === null || c === undefined || c === false) return;
      if (typeof c === 'string' || typeof c === 'number') node.appendChild(document.createTextNode(String(c)));
      else node.appendChild(c);
    });
    return node;
  }

  function clear(node) {
    while (node && node.firstChild) node.removeChild(node.firstChild);
  }

  function shuffle(arr) {
    const a = arr.slice();
    for (let i = a.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      const tmp = a[i]; a[i] = a[j]; a[j] = tmp;
    }
    return a;
  }

  function toast(msg) {
    const t = el('div', { class: 'toast' }, msg);
    document.body.appendChild(t);
    setTimeout(() => t.remove(), 2900);
  }

  function confettiBurst(x, y, opts) {
    opts = opts || {};
    const colors = opts.colors || ['#e85d5d', '#f6b26b', '#4caf6e', '#4a90c2', '#b85450', '#f4d35e'];
    const count = opts.count || 18;
    for (let i = 0; i < count; i++) {
      const p = el('div', { class: 'confetti' });
      p.style.background = colors[i % colors.length];
      p.style.left = (x - 5) + 'px';
      p.style.top  = (y - 7) + 'px';
      document.body.appendChild(p);
      const angle = (Math.PI * 2) * (i / count) + (Math.random() * 0.4 - 0.2);
      const dist  = 70 + Math.random() * 110;
      const dx = Math.cos(angle) * dist;
      const dy = Math.sin(angle) * dist + (Math.random() * 40 - 20);
      const rot = (Math.random() * 720 - 360);
      p.animate(
        [
          { transform: 'translate(0,0) rotate(0deg)', opacity: 1 },
          { transform: 'translate(' + dx + 'px, ' + (dy + 60) + 'px) rotate(' + rot + 'deg)', opacity: 0 }
        ],
        { duration: 700 + Math.random() * 300, easing: 'cubic-bezier(0.22, 1, 0.36, 1)' }
      );
      setTimeout(() => p.remove(), 1100);
    }
  }

    CURRENT_LAYER = layer;

    stageE.classList.add('show-' + layer);

    const labelG = heartE.querySelector('.label-group');

    else labelG.classList.remove('show');

    const flowPaths = heartE.querySelectorAll('.flow-path');
    flowPaths.forEach(fp => {
      if (layer === 'anatomie') fp.style.opacity = '0';
      else if (layer === 'beide') fp.style.opacity = '0.55';
      else if (layer === 'lungen'  && (fp.classList.contains('lungen')  || fp.classList.contains('lungen-back')))  fp.style.opacity = '0.55';
      else if (layer === 'koerper' && (fp.classList.contains('koerper') || fp.classList.contains('koerper-back'))) fp.style.opacity = '0.55';
      else fp.style.opacity = '0';
    });

    const drops = heartE.querySelectorAll('.drop');
    drops.forEach(d => {
      const anim = d.querySelector('animateMotion');
      const pathHref = anim ? anim.querySelector('mpath').getAttribute('href') : '';
      let visible = false;
      if (layer === 'beide') visible = true;
      else if (layer === 'lungen'  && pathHref.indexOf('lungen')  >= 0) visible = true;
      else if (layer === 'koerper' && pathHref.indexOf('koerper') >= 0) visible = true;
      d.style.display = visible ? '' : 'none';

      c.classList.toggle('active', c.dataset.layer === layer);

  function applySpeed(val) {
    const baseLungen = 3.6 / val;
    const baseKoerp  = 3.9 / val;
    const heartBase  = 1.05 / val;
    heartE.querySelectorAll('animateMotion').forEach(a => {
      const mpathHref = a.querySelector('mpath').getAttribute('href');
      a.setAttribute('dur', (mpathHref.indexOf('lungen') >= 0 ? baseLungen : baseKoerp) + 's');
    });
    const heartGroup = heartE.querySelector('.heart-group');
    if (heartGroup) heartGroup.style.animationDuration = heartBase + 's';
    speedLabel.textContent =
      val < 0.7 ? 'langsam' :
      val < 1.4 ? 'normal' :
      val < 2.0 ? 'schnell' : 'sehr schnell';
  }
  speedSlider.addEventListener('input', e => applySpeed(parseFloat(e.target.value)));
  applySpeed(1.0);

  let activePopup = null;
  let activeHighlight = null;
  function closePopup() {
    if (activePopup)    { activePopup.remove();    activePopup = null; }
    if (activeHighlight){ activeHighlight.classList.remove('active'); activeHighlight = null; }
  }

  function showRegionPopup(regionKey, x, y) {
    closePopup();
    const r = REGIONS.find(re => re.key === regionKey);
    if (!r) return;
    const stageRect = stageE.getBoundingClientRect();
    const popup = el('div', { class: 'info-popup' });
    popup.appendChild(el('button', { class: 'close', 'aria-label': 'Schließen', onclick: closePopup }, '×'));
    popup.appendChild(el('div', { class: 'title' }, r.name));
    popup.appendChild(el('p', null, r.info));
    const stageX = (x - stageRect.left);
    const stageY = (y - stageRect.top);
    let leftPx = stageX + 20;
    let topPx  = stageY + 20;
    stageE.appendChild(popup);
    const popRect = popup.getBoundingClientRect();
    if (leftPx + popRect.width > stageRect.width)  leftPx = Math.max(8, stageX - popRect.width - 20);
    if (topPx  + popRect.height > stageRect.height) topPx = Math.max(8, stageY - popRect.height - 20);
    popup.style.left = leftPx + 'px';
    popup.style.top  = topPx  + 'px';
    activePopup = popup;
    showRegionHighlight(regionKey);
    setTimeout(() => {
      const onDoc = (ev) => {
        if (!popup.contains(ev.target) && !ev.target.closest('.hotspot')) {
          closePopup();
          document.removeEventListener('pointerdown', onDoc);
        }
      };
      document.addEventListener('pointerdown', onDoc);
    }, 50);
  }

  function showRegionHighlight(regionKey) {
    const r = REGIONS.find(re => re.key === regionKey);
    if (!r) return;
    const layer = heartE.querySelector('.highlight-layer');
    if (!layer) return;
    clear(layer);
    const hl = el('circle', {
      class: 'region-highlight active',
      cx: r.slot.x, cy: r.slot.y, r: r.slot.r + 6
    });
    layer.appendChild(hl);
    activeHighlight = hl;
  }

  heartE.addEventListener('click', (e) => {
    const hs = e.target.closest('.hotspot');
    if (!hs) return;
    const key = hs.getAttribute('data-region');
    if (!key) return;
    showRegionPopup(key, e.clientX, e.clientY);
  });

  let tourIdx = -1;
  let tourBubble = null;
  function endTour() {
    if (tourBubble) { tourBubble.remove(); tourBubble = null; }
    tourIdx = -1;
    closePopup();
  }
  function getNearestRegion(x, y) {
    let best = REGIONS[0], bestD = Infinity;
    for (const r of REGIONS) {
      const dx = r.slot.x - x, dy = r.slot.y - y;
      const d = dx*dx + dy*dy;
      if (d < bestD) { bestD = d; best = r; }
    }
    return best.key;
  }
  function showTourStep(i) {
    if (i < 0 || i >= TOUR_STEPS.length) { endTour(); return; }
    tourIdx = i;
    const step = TOUR_STEPS[i];
    applyLayer(step.layer || 'beide');
    showRegionHighlight(getNearestRegion(step.x, step.y));

    if (tourBubble) tourBubble.remove();
    const stageRect = stageE.getBoundingClientRect();
    const svgRect   = heartE.getBoundingClientRect();
    const scaleX = svgRect.width  / 600;
    const scaleY = svgRect.height / 600;
    const absX = (svgRect.left - stageRect.left) + step.x * scaleX;
    const absY = (svgRect.top  - stageRect.top)  + step.y * scaleY;

    const bubble = el('div', { class: 'tour-bubble' });
    bubble.appendChild(el('div', { class: 'step' }, 'Schritt ' + (i+1) + ' / ' + TOUR_STEPS.length));
    bubble.appendChild(el('p', null, step.text));
    const ctrls = el('div', { class: 'controls' });
    const prevBtn = el('button', { class: 'prev', onclick: () => showTourStep(i - 1) }, '← Zurück');
    if (i === 0) prevBtn.disabled = true;
    ctrls.appendChild(prevBtn);
    if (i === TOUR_STEPS.length - 1) {
      ctrls.appendChild(el('button', { class: 'next', onclick: endTour }, 'Fertig 🎉'));
    } else {
      ctrls.appendChild(el('button', { class: 'next', onclick: () => showTourStep(i + 1) }, 'Weiter →'));
    }
    bubble.appendChild(ctrls);
    const closeBtn = el('button', { class: 'skip', onclick: endTour, style: 'position:absolute;top:4px;right:8px;background:transparent;color:var(--ink-soft);min-height:28px;padding:0 8px;font-size:18px;border:none;flex:0;' }, '×');
    bubble.appendChild(closeBtn);

    stageE.appendChild(bubble);

    const bRect = bubble.getBoundingClientRect();
    let leftPx = absX + 30;
    let topPx  = absY - bRect.height / 2;
    if (leftPx + bRect.width > stageRect.width) leftPx = Math.max(8, absX - bRect.width - 30);
    if (topPx < 8) topPx = 8;
    if (topPx + bRect.height > stageRect.height) topPx = Math.max(8, stageRect.height - bRect.height - 8);
    bubble.style.left = leftPx + 'px';
    bubble.style.top  = topPx  + 'px';

    tourBubble = bubble;
  }
  document.getElementById('tour-btn').addEventListener('click', () => {
    if (tourBubble) { endTour(); return; }
    showTourStep(0);
  });

  /* =================================================================
   * ÜBEN — Topic chips + mode selector
   * ================================================================= */

  function renderTopicChips() {
    const row = document.getElementById('topic-chips');
    clear(row);
    TOPICS.forEach(t => {
      const isActive = SETUP.topics.indexOf(t.key) >= 0;
      const chip = el('button', {
        class: 'chip' + (isActive ? ' active' : ''),
        'data-topic': t.key
      },
        el('span', { class: 'dot' }),
        t.emoji + ' ' + t.name
      );
      chip.addEventListener('click', () => {
        const idx = SETUP.topics.indexOf(t.key);
        if (idx >= 0) {
          if (SETUP.topics.length === 1) {
            toast('Mindestens ein Thema muss aktiv sein.');
            return;
          }
          SETUP.topics.splice(idx, 1);
        } else {
          SETUP.topics.push(t.key);
        }
        SetupStore.save();
        renderTopicChips();
        renderActiveMode();
      });
      row.appendChild(chip);
    });
  }
  renderTopicChips();

  let ACTIVE_MODE = 'beschriften';
  document.querySelectorAll('#mode-grid .mode-card').forEach(card => {
    card.addEventListener('click', () => {
      document.querySelectorAll('#mode-grid .mode-card').forEach(c => c.classList.remove('active'));
      card.classList.add('active');
      ACTIVE_MODE = card.dataset.mode;
      renderActiveMode();
    });
  });

  function renderActiveMode() {
    closePopup();
    if (ACTIVE_MODE === 'beschriften') renderBeschriften();
    else if (ACTIVE_MODE === 'sortierer') renderSortierer();
    else if (ACTIVE_MODE === 'flashcards') renderFlashcards();
  }

  function activeRegionsForLabelGame() {
    const filtered = REGIONS.filter(r => SETUP.topics.indexOf(r.topic) >= 0);
    if (filtered.length === 0) return [];
    return shuffle(filtered).slice(0, Math.min(8, filtered.length));
  }

  /* =================================================================
   * MODE 1: BESCHRIFTEN
   * ================================================================= */

  function renderBeschriften() {
    const container = document.getElementById('mode-container');
    clear(container);

    const regions = activeRegionsForLabelGame();
    if (regions.length === 0) {
      container.appendChild(el('div', { class: 'completion' },
        el('div', { class: 'big' }, 'Bitte mindestens ein Thema auswählen.'),
        el('p',   { class: 'sub' }, 'Wähle oben Themen wie „Anatomie" oder „Klappen".')
      ));
      return;
    }

    const counter = el('div', { class: 'session-counter' }, 'Zuordnungen: 0 / ' + regions.length);
    container.appendChild(counter);

    const wrap = el('div', { class: 'label-game' });

    const stageWrap = el('div', { class: 'game-stage' });
    const svg = buildHeartSVG({ interactive: false, showFlow: false, showLabels: false, idPrefix: 'g1' });
    stageWrap.appendChild(svg);

    const poolWrap = el('div');
    poolWrap.appendChild(el('h3', null, '🏷️ Ziehe die Begriffe an die richtige Stelle'));
    poolWrap.appendChild(el('p', { style: 'color: var(--ink-soft); font-size: 14px; margin: 0 0 12px;' },
      'Tipp: Auf dem iPad kannst du auch auf eine Karte tippen, dann erscheint eine Auswahl.'));
    const pool = el('div', { class: 'label-cards' });
    poolWrap.appendChild(pool);

    const slotLayer  = el('g', { class: 'drop-slots' });
    const labelLayer = el('g', { class: 'slot-labels' });
    regions.forEach(r => {
      slotLayer.appendChild(el('circle', {
        class: 'drop-slot',
        cx: r.slot.x, cy: r.slot.y, r: r.slot.r,
        'data-region': r.key
      }));
      labelLayer.appendChild(el('text', {
        class: 'slot-label',
        x: r.slot.x, y: r.slot.y + 5,
        'data-region': r.key,
        'text-anchor': 'middle'
      }, r.name));
    });
    svg.appendChild(slotLayer);
    svg.appendChild(labelLayer);

    const cards = shuffle(regions).map(r =>
      el('div', { class: 'label-card', 'data-region': r.key }, r.name)
    );
    cards.forEach(c => pool.appendChild(c));

    wrap.appendChild(stageWrap);
    wrap.appendChild(poolWrap);
    container.appendChild(wrap);

    let placedCount = 0;
    const slotEls = {};
    slotLayer.querySelectorAll('.drop-slot').forEach(s => {
      slotEls[s.getAttribute('data-region')] = s;
    });

    function onResult(correctKey, chosenKey, cardEl) {
      const isCorrect = correctKey === chosenKey;
      const region = REGIONS.find(r => r.key === correctKey);
      StatsStore.record(region.topic, isCorrect);
      if (isCorrect) {
        const slot = slotEls[correctKey];
        if (slot) {
          slot.classList.add('filled-correct');
          const labelText = labelLayer.querySelector('text[data-region="'+correctKey+'"]');
          if (labelText) labelText.classList.add('show');
          const rect = slot.getBoundingClientRect();
          confettiBurst(rect.left + rect.width/2, rect.top + rect.height/2, { count: 14 });
        }
        cardEl.classList.add('placed');
        placedCount++;
        counter.textContent = 'Zuordnungen: ' + placedCount + ' / ' + regions.length;
        if (placedCount === regions.length) {
          setTimeout(() => {
            container.appendChild(el('div', { class: 'completion' },
              el('div', { class: 'big' }, '💗 Alles richtig zugeordnet!'),
              el('p',   { class: 'sub' }, 'Toll gemacht. Neue Runde?'),
              el('button', { class: 'primary-btn', onclick: () => renderBeschriften() }, 'Neue Runde')
            ));
            confettiBurst(window.innerWidth/2, window.innerHeight*0.4, { count: 40 });
            renderStats();
          }, 600);
        } else {
          renderStats();
        }
      } else {
        cardEl.classList.add('wrong');
        if (slotEls[chosenKey]) slotEls[chosenKey].classList.add('shake');
        setTimeout(() => {
          cardEl.classList.remove('wrong');
          if (slotEls[chosenKey]) slotEls[chosenKey].classList.remove('shake');
        }, 500);
      }
    }

    cards.forEach(card => setupLabelDrag(card, slotEls, onResult, regions));
  }

  function setupLabelDrag(cardEl, slotEls, onResult, regions) {
    let startX = 0, startY = 0, currentX = 0, currentY = 0;
    let hasMoved = false;

    function onPointerDown(e) {
      if (cardEl.classList.contains('placed')) return;
      e.preventDefault();
      cardEl.setPointerCapture(e.pointerId);
      startX = e.clientX; startY = e.clientY;
      currentX = startX; currentY = startY;
      hasMoved = false;
      cardEl.classList.add('dragging');
      cardEl.classList.remove('returning');
    }
    function onPointerMove(e) {
      if (!cardEl.hasPointerCapture(e.pointerId)) return;
      currentX = e.clientX; currentY = e.clientY;
      const dx = currentX - startX, dy = currentY - startY;
      if (Math.abs(dx) > 10 || Math.abs(dy) > 10) hasMoved = true;
      cardEl.style.transform = 'translate(' + dx + 'px, ' + dy + 'px) scale(1.07)';
      Object.values(slotEls).forEach(s => s.classList.remove('hover-target'));
      const t = document.elementFromPoint(currentX, currentY);
      if (t && t.classList && t.classList.contains('drop-slot') && !t.classList.contains('filled-correct')) {
        t.classList.add('hover-target');
      }
    }
    function onPointerUp(e) {
      if (cardEl.hasPointerCapture(e.pointerId)) cardEl.releasePointerCapture(e.pointerId);
      cardEl.classList.remove('dragging');
      Object.values(slotEls).forEach(s => s.classList.remove('hover-target'));

      if (!hasMoved) {
        cardEl.style.transform = '';
        showLabelTapFallback(cardEl, regions, (chosenKey) => {
          onResult(cardEl.getAttribute('data-region'), chosenKey, cardEl);
        });
        return;
      }
      const t = document.elementFromPoint(currentX, currentY);
      let chosenKey = null;
      if (t && t.classList && t.classList.contains('drop-slot')) {
        chosenKey = t.getAttribute('data-region');
      }
      if (chosenKey) {
        onResult(cardEl.getAttribute('data-region'), chosenKey, cardEl);
      }
      if (!cardEl.classList.contains('placed')) {
        cardEl.classList.add('returning');
        cardEl.style.transform = '';
        setTimeout(() => cardEl.classList.remove('returning'), 320);
      }
    }
    cardEl.addEventListener('pointerdown',  onPointerDown);
    cardEl.addEventListener('pointermove',  onPointerMove);
    cardEl.addEventListener('pointerup',    onPointerUp);
    cardEl.addEventListener('pointercancel', onPointerUp);
  }

  let activeTapPopup = null;
  function showLabelTapFallback(cardEl, regions, callback) {
    if (activeTapPopup) { activeTapPopup.remove(); activeTapPopup = null; }
    const popup = el('div', { class: 'tap-popup' });
    const remaining = regions.filter(r => {
      const slot = document.querySelector('.drop-slot[data-region="'+r.key+'"]');
      return slot && !slot.classList.contains('filled-correct');
    });
    remaining.forEach(r => {
      const b = el('button', null, r.name);
      b.addEventListener('click', () => {
        popup.remove();
        activeTapPopup = null;
        callback(r.key);
      });
      popup.appendChild(b);
    });
    const rect = cardEl.getBoundingClientRect();
    document.body.appendChild(popup);
    const pRect = popup.getBoundingClientRect();
    let left = rect.left;
    let top  = rect.bottom + 8;
    if (left + pRect.width > window.innerWidth - 8) left = window.innerWidth - pRect.width - 8;
    if (top + pRect.height > window.innerHeight - 8) top = rect.top - pRect.height - 8;
    if (left < 8) left = 8;
    popup.style.left = left + 'px';
    popup.style.top  = top  + 'px';
    activeTapPopup = popup;
    setTimeout(() => {
      const onDoc = (ev) => {
        if (!popup.contains(ev.target)) {
          popup.remove();
          activeTapPopup = null;
          document.removeEventListener('pointerdown', onDoc);
        }
      };
      document.addEventListener('pointerdown', onDoc);
    }, 50);
  }

  /* =================================================================
   * MODE 2: BLUTFLUSS-SORTIERER
   * ================================================================= */

  let SORTER_CIRCUIT = 'lungen';

  function getStationsForCircuit() {
    if (SORTER_CIRCUIT === 'lungen')  return STATIONS_LUNGEN.slice();
    if (SORTER_CIRCUIT === 'koerper') return STATIONS_KOERPER.slice();
    return STATIONS_BEIDE.slice();
  }

  function renderSortierer() {
    const container = document.getElementById('mode-container');
    clear(container);

    const wrap = el('div', { class: 'sorter-wrap' });

    const toolbar = el('div', { class: 'sort-toolbar' });
    const seg = el('div', { class: 'seg' });
    const circuits = [
      { k: 'lungen',  l: 'Lungenkreislauf', allowed: SETUP.topics.indexOf('lungen')  >= 0 },
      { k: 'koerper', l: 'Körperkreislauf', allowed: SETUP.topics.indexOf('koerper') >= 0 },
      { k: 'beide',   l: 'Beide kombiniert', allowed: SETUP.topics.indexOf('lungen') >= 0 || SETUP.topics.indexOf('koerper') >= 0 }
    ];
    const firstAllowed = circuits.find(c => c.allowed);
    if (!firstAllowed) {
      container.appendChild(el('div', { class: 'completion' },
        el('div', { class: 'big' }, 'Aktiviere oben „Lungenkreislauf" oder „Körperkreislauf".'),
        el('p',   { class: 'sub' }, 'Diese Themen sind für den Blutfluss-Sortierer nötig.')
      ));
      return;
    }
    if (!circuits.find(c => c.k === SORTER_CIRCUIT && c.allowed)) SORTER_CIRCUIT = firstAllowed.k;
    circuits.forEach(c => {
      const b = el('button', {
        class: SORTER_CIRCUIT === c.k ? 'active' : ''
      }, c.l);
      if (!c.allowed) b.disabled = true;
      b.addEventListener('click', () => {
        if (!c.allowed) { toast('Aktiviere „' + c.l + '" oben in den Themen.'); return; }
        SORTER_CIRCUIT = c.k;
        renderSortierer();
      });
      seg.appendChild(b);
    });
    toolbar.appendChild(seg);

    const checkBtn = el('button', { class: 'primary-btn' }, '✓ Prüfen');
    const resetBtn = el('button', { class: 'ghost-btn' }, '↺ Neu mischen');
    toolbar.appendChild(checkBtn);
    toolbar.appendChild(resetBtn);
    wrap.appendChild(toolbar);

    wrap.appendChild(el('h3', { style: 'text-align:center;margin-top:4px;' },
      SORTER_CIRCUIT === 'lungen'  ? '💨 Bring die Stationen des Lungenkreislaufs in die richtige Reihenfolge' :
      SORTER_CIRCUIT === 'koerper' ? '💪 Bring die Stationen des Körperkreislaufs in die richtige Reihenfolge' :
                                     '🔄 Bring beide Kreisläufe in die richtige Reihenfolge'
    ));

    const correctOrder = getStationsForCircuit();
    const poolOrder = shuffle(correctOrder);

    const zones = el('div', { class: 'sorter-zones' });
    correctOrder.forEach((s, i) => {
      const slot = el('div', { class: 'sort-slot', 'data-pos': String(i) },
        el('div', { class: 'num' }, String(i + 1))
      );
      zones.appendChild(slot);
      if (i < correctOrder.length - 1) {
        zones.appendChild(el('div', { class: 'sort-arrow' }, '→'));
      }
    });
    wrap.appendChild(zones);

    wrap.appendChild(el('h3', { style: 'text-align:center;font-size:15px;color:var(--ink-soft);margin-top:14px;' }, 'Karten zum Ziehen:'));
    const poolEl = el('div', { class: 'sorter-pool' });
    poolOrder.forEach(st => {
      const cls = 'sort-card ' + (st.type === 'oxy' ? 'oxy' : st.type === 'deoxy' ? 'deoxy' : '');
      const card = el('div', { class: cls, 'data-station': st.id }, st.label);
      poolEl.appendChild(card);
    });
    wrap.appendChild(poolEl);

    container.appendChild(wrap);

    const slotEls = zones.querySelectorAll('.sort-slot');
    const slotMap = {};
    slotEls.forEach(s => slotMap[s.getAttribute('data-pos')] = s);

    poolEl.querySelectorAll('.sort-card').forEach(card => {
      setupSortDrag(card, slotMap, poolEl);
    });

    checkBtn.addEventListener('click', () => {
      let allCorrect = true;
      let anyFilled = false;
      slotEls.forEach((slot, i) => {
        const card = slot.querySelector('.sort-card');
        if (card) anyFilled = true;
        const expected = correctOrder[i].id;
        const got = card ? card.getAttribute('data-station') : null;
        slot.classList.remove('correct-final', 'wrong-final');
        if (got === expected) slot.classList.add('correct-final');
        else { slot.classList.add('wrong-final'); allCorrect = false; }
      });
      if (!anyFilled) { toast('Ziehe zuerst Karten in die Felder.'); return; }
      const topic = SORTER_CIRCUIT === 'koerper' ? 'koerper' : 'lungen';
      StatsStore.record(topic, allCorrect);
      renderStats();
      if (allCorrect) {
        confettiBurst(window.innerWidth/2, window.innerHeight*0.4, { count: 40 });
        toast('Perfekt! 💗');
        setTimeout(() => {
          container.appendChild(el('div', { class: 'completion' },
            el('div', { class: 'big' }, '🎉 Reihenfolge stimmt!'),
            el('p',   { class: 'sub' }, 'Neue Runde?'),
            el('button', { class: 'primary-btn', onclick: () => renderSortierer() }, 'Neue Runde')
          ));
        }, 400);
      } else {
        toast('Noch nicht ganz — die roten Felder stimmen nicht.');
      }
    });
    resetBtn.addEventListener('click', () => renderSortierer());
  }

  function setupSortDrag(cardEl, slotMap, poolEl) {
    let startX = 0, startY = 0, currentX = 0, currentY = 0;
    let hasMoved = false;

    function onPointerDown(e) {
      e.preventDefault();
      cardEl.setPointerCapture(e.pointerId);
      const rect = cardEl.getBoundingClientRect();
      cardEl.classList.add('dragging');
      cardEl.style.position = 'fixed';
      cardEl.style.left = rect.left + 'px';
      cardEl.style.top  = rect.top  + 'px';
      cardEl.style.width = rect.width + 'px';
      cardEl.style.margin = '0';
      cardEl.style.zIndex = '60';
      document.body.appendChild(cardEl);
      startX = e.clientX; startY = e.clientY;
      currentX = startX; currentY = startY;
      hasMoved = false;
    }

    function onPointerMove(e) {
      if (!cardEl.hasPointerCapture(e.pointerId)) return;
      currentX = e.clientX; currentY = e.clientY;
      const dx = currentX - startX, dy = currentY - startY;
      if (Math.abs(dx) > 6 || Math.abs(dy) > 6) hasMoved = true;
      cardEl.style.transform = 'translate(' + dx + 'px, ' + dy + 'px) scale(1.05)';
      Object.values(slotMap).forEach(s => s.classList.remove('hover-target'));
      const elBelow = document.elementFromPoint(currentX, currentY);
      const slot = elBelow && elBelow.closest('.sort-slot');
      if (slot) slot.classList.add('hover-target');
    }

    function onPointerUp(e) {
      if (cardEl.hasPointerCapture(e.pointerId)) cardEl.releasePointerCapture(e.pointerId);
      cardEl.classList.remove('dragging');
      Object.values(slotMap).forEach(s => s.classList.remove('hover-target'));

      const elBelow = document.elementFromPoint(currentX, currentY);
      const slot = elBelow && elBelow.closest('.sort-slot');

      cardEl.style.position = '';
      cardEl.style.left = '';
      cardEl.style.top  = '';
      cardEl.style.width = '';
      cardEl.style.margin = '';
      cardEl.style.transform = '';
      cardEl.style.zIndex = '';

      if (slot) {
        const existing = slot.querySelector('.sort-card');
        if (existing && existing !== cardEl) {
          poolEl.appendChild(existing);
        }
        slot.classList.remove('correct-final', 'wrong-final');
        slot.appendChild(cardEl);
      } else {
        poolEl.appendChild(cardEl);
      }
      Object.values(slotMap).forEach(s => {
        s.classList.toggle('filled', !!s.querySelector('.sort-card'));
      });
    }

    cardEl.addEventListener('pointerdown',  onPointerDown);
    cardEl.addEventListener('pointermove',  onPointerMove);
    cardEl.addEventListener('pointerup',    onPointerUp);
    cardEl.addEventListener('pointercancel', onPointerUp);
  }

  /* =================================================================
   * MODE 3: FLASHCARDS
   * ================================================================= */

  let FLASH_DECK = [];
  let FLASH_IDX = 0;
  let FLASH_RIGHT = 0;
  let FLASH_DONE  = 0;

  function buildFlashDeck() {
    const filtered = FLASHCARDS.filter(c => SETUP.topics.indexOf(c.topic) >= 0);
    const weighted = [];
    filtered.forEach(c => {
      const box = LeitnerStore.getBox(c.id);
      const w = BOX_WEIGHTS[Math.min(MAX_BOX, Math.max(1, box)) - 1];
      const copies = Math.max(1, Math.round(w));
      for (let i = 0; i < copies; i++) weighted.push(c);
    });
    const shuffled = shuffle(weighted);
    const seen = new Set();
    const deck = [];
    for (const c of shuffled) {
      if (seen.has(c.id)) continue;
      seen.add(c.id);
      deck.push(c);
      if (deck.length >= 12) break;
    }
    return deck;
  }

  function renderFlashcards() {
    const container = document.getElementById('mode-container');
    clear(container);

    FLASH_DECK = buildFlashDeck();
    FLASH_IDX = 0;
    FLASH_RIGHT = 0;
    FLASH_DONE  = 0;

    if (FLASH_DECK.length === 0) {
      container.appendChild(el('div', { class: 'completion' },
        el('div', { class: 'big' }, 'Keine Karteikarten für deine Themen.'),
        el('p',   { class: 'sub' }, 'Aktiviere oben ein paar Themen.')
      ));
      return;
    }

    const wrap = el('div', { class: 'flash-wrap' });

    const sessionInfo = el('div', { class: 'flash-progress' },
      el('span', { id: 'flash-count' }, '1 / ' + FLASH_DECK.length),
      el('div',  { class: 'bar' }, el('div', { id: 'flash-bar' }))
    );

    const card = el('div', { class: 'flash-card', id: 'flash-card' });
    const inner = el('div', { class: 'flash-inner' });
    const front = el('div', { class: 'flash-face flash-front' });
    const back  = el('div', { class: 'flash-face flash-back' });
    front.appendChild(el('div', { class: 'badge' }, 'BEGRIFF'));
    front.appendChild(el('div', { class: 'box-pill', id: 'flash-box-front' }, 'Box 1'));
    front.appendChild(el('div', { class: 'term', id: 'flash-term' }, '—'));
    front.appendChild(el('div', { class: 'hint' }, 'Tippen, um zu drehen 🔄'));
    back.appendChild(el('div', { class: 'badge' }, 'FUNKTION'));
    back.appendChild(el('div', { class: 'box-pill', id: 'flash-box-back' }, 'Box 1'));
    back.appendChild(el('div', { class: 'func', id: 'flash-func' }, '—'));
    back.appendChild(el('div', { class: 'hint' }, 'Wie sicher saß sie?'));
    inner.appendChild(front);
    inner.appendChild(back);
    card.appendChild(inner);

    const actions = el('div', { class: 'flash-actions' });
    const againBtn = el('button', { class: 'again', id: 'flash-again' }, '🔄 Nochmal');
    const sitztBtn = el('button', { class: 'sitzt', id: 'flash-sitzt' }, '✓ Sitzt');
    againBtn.disabled = true;
    sitztBtn.disabled = true;
    actions.appendChild(againBtn);
    actions.appendChild(sitztBtn);

    wrap.appendChild(sessionInfo);
    wrap.appendChild(card);
    wrap.appendChild(actions);
    container.appendChild(wrap);

    card.addEventListener('click', () => {
      card.classList.toggle('flipped');
      if (card.classList.contains('flipped')) {
        againBtn.disabled = false;
        sitztBtn.disabled = false;
      }
    });

    againBtn.addEventListener('click', (e) => {
      e.stopPropagation();
      const c = FLASH_DECK[FLASH_IDX];
      LeitnerStore.demote(c.id);
      StatsStore.record(c.topic, false);
      FLASH_DONE++;
      renderStats();
      nextFlash();
    });
    sitztBtn.addEventListener('click', (e) => {
      e.stopPropagation();
      const c = FLASH_DECK[FLASH_IDX];
      LeitnerStore.promote(c.id);
      StatsStore.record(c.topic, true);
      FLASH_RIGHT++;
      FLASH_DONE++;
      const rect = sitztBtn.getBoundingClientRect();
      confettiBurst(rect.left + rect.width/2, rect.top, { count: 12, colors: ['#4caf6e', '#a8dfba', '#f4d35e'] });
      renderStats();
      nextFlash();
    });

    showFlash(0);
  }

  function showFlash(i) {
    if (i >= FLASH_DECK.length) {
      const container = document.getElementById('mode-container');
      container.appendChild(el('div', { class: 'completion' },
        el('div', { class: 'big' }, '🎉 Runde geschafft!'),
        el('p',   { class: 'sub' }, FLASH_RIGHT + ' von ' + FLASH_DONE + ' saßen direkt.'),
        el('button', { class: 'primary-btn', onclick: () => renderFlashcards() }, 'Neue Runde')
      ));
      confettiBurst(window.innerWidth/2, window.innerHeight*0.4, { count: 50 });
      return;
    }
    FLASH_IDX = i;
    const c = FLASH_DECK[i];
    const box = LeitnerStore.getBox(c.id);
    document.getElementById('flash-term').textContent = c.term;
    document.getElementById('flash-func').textContent = c.func;
    document.getElementById('flash-box-front').textContent = 'Box ' + box;
    document.getElementById('flash-box-back').textContent  = 'Box ' + box;
    document.getElementById('flash-count').textContent = (i+1) + ' / ' + FLASH_DECK.length;
    document.getElementById('flash-bar').style.width = (i / FLASH_DECK.length * 100) + '%';
    document.getElementById('flash-card').classList.remove('flipped');
    document.getElementById('flash-again').disabled = true;
    document.getElementById('flash-sitzt').disabled = true;
  }

  function nextFlash() {
    showFlash(FLASH_IDX + 1);
  }

  /* =================================================================
   * STATS
   * ================================================================= */

  function renderStats() {
    const grid = document.getElementById('stats-grid');
    if (!grid) return;
    clear(grid);

    let totalAll = 0, rightAll = 0;
    TOPICS.forEach(t => {
      const d = StatsStore.data[t.key] || { total: 0, right: 0, wrong: 0 };
      totalAll += d.total;
      rightAll += d.right;
    });
    const accAll = totalAll > 0 ? Math.round(rightAll / totalAll * 100) : 0;

    [
      { key: 'Gesamt',  val: totalAll,                                                        sub: 'Aufgaben' },
      { key: 'Richtig', val: rightAll,                                                        sub: accAll + '%' },
      { key: 'Karten',  val: Object.keys(LeitnerStore.data).length,                          sub: 'gelernt' },
      { key: 'Box ≥ 4', val: Object.values(LeitnerStore.data).filter(d => d.box >= 4).length,sub: 'sitzt' }
    ].forEach(s => {
      grid.appendChild(el('div', { class: 'stat-tile' },
        el('div', { class: 'key' }, s.key),
        el('div', { class: 'val' }, String(s.val)),
        el('div', { class: 'sub' }, s.sub)
      ));
    });

    const list = document.getElementById('progress-list');
    clear(list);
    TOPICS.forEach(t => {
      const d = StatsStore.data[t.key] || { total: 0, right: 0, wrong: 0 };
      const pct = d.total > 0 ? Math.round(d.right / d.total * 100) : 0;
      list.appendChild(el('div', { class: 'progress-row' },
        el('div', { class: 'topic' }, t.emoji + ' ' + t.name),
        el('div', { class: 'bar' }, el('div', { style: 'width:' + pct + '%' })),
        el('div', { class: 'pct' }, d.total ? (pct + '%') : '–')
      ));
    });
  }
  renderStats();

  /* =================================================================
   * EXPORT / IMPORT / RESET
   * ================================================================= */

  function exportProgress() {
    const payload = {
      app: APP_ID,
      version: 1,
      exportedAt: new Date().toISOString(),
      setup: SETUP,
      leitner: LeitnerStore.data,
      stats: StatsStore.data
    };
    const blob = new Blob([JSON.stringify(payload, null, 2)], { type: 'application/json' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    const date = new Date().toISOString().slice(0, 10);
    a.href = url;
    a.download = 'herz-kreislauf-fortschritt-' + date + '.json';
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    setTimeout(() => URL.revokeObjectURL(url), 1000);
    toast('Fortschritt gespeichert ✓');
  }

  function importProgress() {
    const input = document.createElement('input');
    input.type = 'file';
    input.accept = 'application/json,.json';
    input.style.display = 'none';
    input.onchange = (e) => {
      const file = e.target.files && e.target.files[0];
      if (!file) return;
      const reader = new FileReader();
      reader.onload = () => {
        try {
          const data = JSON.parse(reader.result);
          if (!data || data.app !== APP_ID) {
            alert('Diese Datei ist kein gültiges Herz-Kreislauf-Backup.');
            return;
          }
          const when = data.exportedAt ? new Date(data.exportedAt).toLocaleDateString('de-DE') : 'unbekanntem Datum';
          if (!confirm('Backup vom ' + when + ' einspielen?\n\nDer aktuelle Fortschritt auf diesem Gerät wird ersetzt.')) return;
          if (data.setup && typeof data.setup === 'object') {
            SETUP = {
              topics: Array.isArray(data.setup.topics) && data.setup.topics.length ? data.setup.topics : DEFAULT_SETUP.topics
            };
            SetupStore.save();
          }
          if (data.leitner && typeof data.leitner === 'object') {
            LeitnerStore.data = data.leitner;
            LeitnerStore.save();
          }
          if (data.stats && typeof data.stats === 'object') {
            StatsStore.data = {};
            StatsStore.load();
            StatsStore.data = Object.assign(StatsStore.data, data.stats);
            StatsStore.save();
          }
          renderTopicChips();
          renderStats();
          renderActiveMode();
          toast('Fortschritt wiederhergestellt ✓');
        } catch (err) {
          alert('Fehler beim Einlesen der Datei:\n' + err.message);
        }
      };
      reader.onerror = () => alert('Datei konnte nicht gelesen werden.');
      reader.readAsText(file);
    };
    document.body.appendChild(input);
    input.click();
    setTimeout(() => input.remove(), 1000);
  }

  function resetAll() {
    if (!confirm('Wirklich allen Fortschritt löschen?\n\nKarteikarten, Statistiken und Themenauswahl werden zurückgesetzt.')) return;
    LeitnerStore.reset();
    StatsStore.reset();
    SETUP = JSON.parse(JSON.stringify(DEFAULT_SETUP));
    SetupStore.save();
    renderTopicChips();
    renderStats();
    renderActiveMode();
    toast('Alles zurückgesetzt.');
  }

  document.getElementById('btn-export').addEventListener('click', exportProgress);
  document.getElementById('btn-import').addEventListener('click', importProgress);
  document.getElementById('btn-reset' ).addEventListener('click', resetAll);

  renderActiveMode();
  </script>
</body>
</html>
